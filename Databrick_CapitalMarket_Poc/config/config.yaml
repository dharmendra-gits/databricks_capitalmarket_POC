# Databricks Medallion Architecture Configuration
# Capital Markets Post-Trade Settlement

# Source to Target Mapping Configuration
source_to_target_mapping:
  # Trade Data Configuration
  trades:
    source_format: "json"
    source_path: "dbfs:/mnt/landing/trades/"
    bronze_table: "bronze_trades"
    silver_table: "silver_trades"
    gold_table: "gold_trade_aggregates"
    
  # Instrument Reference Data
  instruments:
    source_format: "csv"
    source_path: "dbfs:/mnt/landing/instruments/"
    bronze_table: "bronze_instruments"
    silver_table: "silver_instruments"

# Delta Lake Configuration
delta_lake:
  bronze_path: "dbfs:/mnt/delta/bronze/"
  silver_path: "dbfs:/mnt/delta/silver/"
  gold_path: "dbfs:/mnt/delta/gold/"

# Spark Configuration
spark:
  app_name: "capital_markets_medallion"
  master: "local[*]"
  config:
    "spark.sql.extensions": "io.delta.sql.DeltaSparkSessionExtension"
    "spark.sql.catalog.spark_catalog": "org.apache.spark.sql.delta.catalog.DeltaCatalog"
    "spark.databricks.delta.retentionDurationCheck.enabled": "false"
    # Databricks Configuration - Loaded from .env file
    "spark.databricks.service.address": "${DATABRICKS_WORKSPACE_URL}"
    "spark.databricks.service.token": "${DATABRICKS_TOKEN}"
    "spark.databricks.cluster.profile": "${DATABRICKS_CLUSTER_ID}"
    # Alternative for serverless: "spark.databricks.cluster.useServerless": "${DATABRICKS_USE_SERVERLESS:-false}"
    "spark.sql.parquet.enableVectorizedReader": "true"

# Data Quality Configuration
data_quality:
  # Schema validation rules
  trades_schema:
    TradeID: "string"
    InstrumentID: "string"
    Counterparty: "string"
    Notional: "double"
    Currency: "string"
    TradeDate: "timestamp"
    SettlementDate: "timestamp"
    Status: "string"
    
  # Validation rules
  validation_rules:
    required_fields: ["TradeID", "InstrumentID", "Notional", "Currency"]
    notional_min: 0
    currency_length: 3

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/capital_markets.log"
